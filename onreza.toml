#:schema https://docs.onreza.ru/schemas/onreza-project-v1.schema.json

[project]
name = "optimus-ai"

[build]
install_command = "pip install ."
command = "npm run build"
output_directory = "onreza-output"
output_dirs = ["onreza-output"]

[deploy]
compute = "process"
entry = "server.cjs"
health_check_path = "/health"
